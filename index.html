<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Airplane Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Wczytanie Three.js po stronie klienta (CDN) w miejsce klasycznego paczkowania -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>ARCADE AIRPLANE</h1>
            <button id="start-btn">START GAME</button>
        </div>
        
        <!-- HUD -->
        <div id="hud" class="screen hidden">
            <div class="score">SCORE: <span id="score-val">0</span></div>
            <div class="health">HP: 
                <div id="health-bar"><div id="health-val"></div></div>
            </div>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
            <button id="restart-btn">TRY AGAIN</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
